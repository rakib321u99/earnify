<body>
<div class="dashboard">
    <div class="earnings-header">
        <h3>My Earning</h3>
        <div class="total-amount">
            <span class="coin-icon"></span>
            <span id="totalCoinsDisplay">0.0</span>
        </div>
    </div>
    <div class="options-grid">
        <div class="option-card" data-option="spin">
            <div class="option-left"><div class="option-icon">🎡</div><div class="option-text"><h4>Get Spain</h4><p>Spin & win coins up to 10</p></div></div>

        </div>
        <div class="option-card" data-option="scratch">
            <div class="option-left"><div class="option-icon">🎫</div><div class="option-text"><h4>Get Scratch</h4><p>Scratch & win 15-45 coins</p></div></div>

        </div>
        <div class="option-card" data-option="redeem">
            <div class="option-left"><div class="option-icon">💸</div><div class="option-text"><h4>Redeem Point</h4><p>Withdraw your coins</p></div></div>
            <div class="arrow">›</div>
        </div>
        <div class="option-card" data-option="history">
            <div class="option-left"><div class="option-icon">📜</div><div class="option-text"><h4>Redeem History</h4><p>Transactions & Referrals</p></div></div>

</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDnju-cm2fvx8NHFbFHBdg3oqIGULjUvKI",
        authDomain: "tep-2-cdca8.firebaseapp.com",
        databaseURL: "https://tep-2-cdca8-default-rtdb.firebaseio.com",
        projectId: "tep-2-cdca8",
        storageBucket: "tep-2-cdca8.firebasestorage.app",
        messagingSenderId: "361310949782",
        appId: "1:361310949782:web:f6e83f4260519440e88db7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Persistent User ID
    let tgUser = { id: null, username: "player" };
    const savedUserId = localStorage.getItem('earnify_user_id');
    
    try {
        if (window.Telegram && Telegram.WebApp) {
            const initData = Telegram.WebApp.initDataUnsafe;
            if (initData && initData.user) {
                tgUser = { 
                    id: initData.user.id.toString(), 
                    username: initData.user.username || "user" 
                };
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
            }
        }
    } catch(e) { console.log("Not in Telegram"); }
    
    if (!tgUser.id) {
        tgUser.id = savedUserId || ("user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8));
        localStorage.setItem('earnify_user_id', tgUser.id);
    } else {
        localStorage.setItem('earnify_user_id', tgUser.id);
    }

    const userId = tgUser.id;
    let userCoins = 0;
    let coinsLoaded = false;
    const MONETAG_ZONE = '10846482';
    
    // IMPORTANT: Get the current app URL for referral (not Telegram channel)
    // This gets the actual hosted app URL
    let APP_URL = window.location.href;
    
    // If running locally (file://), we need to use a placeholder
    // In production, you should host this file on a server
    if (APP_URL.startsWith('file://')) {
        // Show a warning and use a better approach
        APP_URL = window.location.href;
        showToast("⚠️ Please host this app on a server for referral links to work properly");
    }
    
    // Create referral link with current app URL
    const REFERRAL_LINK = `${APP_URL}?ref=${userId}`;
    
    // AD URLs
    const AD_URLS = [
        `https://ads.libtl.com/www/delivery/zone.php?zone=${MONETAG_ZONE}`,
        `https://cdn.libtl.com/popunder/${MONETAG_ZONE}`,
        `https://pop.libtl.com/${MONETAG_ZONE}`
    ];
    
    let currentAdIndex = 0;
    
    function showMonetagSDK(onSuccess, onFailure) {
        const adFunc = window[`show_${MONETAG_ZONE}`];
        if (typeof adFunc === 'function') {
            try {
                adFunc();
                setTimeout(() => onSuccess(), 3000);
                return true;
            } catch(e) { return false; }
        }
        return false;
    }
    
    function showDirectPopup(onSuccess, onFailure) {
        if (currentAdIndex >= AD_URLS.length) return false;
        const popupUrl = AD_URLS[currentAdIndex] + `&t=${Date.now()}`;
        const adWindow = window.open(popupUrl, '_blank', 'width=500,height=600');
        if (adWindow && !adWindow.closed) {
            setTimeout(() => onSuccess(), 3500);
            return true;
        }
        currentAdIndex++;
        return false;
    }
    
    function showIframeAd(onSuccess, onFailure) {
        const modalHTML = `
            <h3>📺 Watch Ad to Claim Reward</h3>
            <p>Please wait 10 seconds...</p>
            <iframe src="https://ads.libtl.com/www/delivery/zone.php?zone=${MONETAG_ZONE}" 
                style="width:100%; height:250px; border:none; border-radius:16px;"></iframe>
            <button id="adCompleteBtn" class="ad-button" disabled>⏳ Please wait...</button>
        `;
        const container = openModal(modalHTML);
        const completeBtn = container.querySelector('#adCompleteBtn');
        setTimeout(() => {
            completeBtn.disabled = false;
            completeBtn.innerHTML = "✅ Claim Reward";
            completeBtn.onclick = () => { closeModal(); onSuccess(); };
        }, 10000);
        return true;
    }
    
    function showRewardedAd(onSuccess, onFailure) {
        showToast("📺 Loading ad...");
        if (showMonetagSDK(onSuccess, onFailure)) return;
        currentAdIndex = 0;
        if (showDirectPopup(onSuccess, onFailure)) return;
        if (showIframeAd(onSuccess, onFailure)) return;
        if (confirm("⚠️ Ad unavailable. Claim reward without ad? (Test Mode)")) {
            onSuccess();
        } else {
            onFailure(new Error("No ad available"));
        }
    }
    
    function showToast(text) {
        const toast = document.getElementById("toastMsg");
        toast.innerText = text;
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 2500);
    }

    function updateCoins(newBalance, showMsg = false) {
        userCoins = newBalance;
        document.getElementById("totalCoinsDisplay").innerText = userCoins.toFixed(2);
        db.ref(`users/${userId}/coins`).set(userCoins).catch(err => console.error("Save error:", err));
        localStorage.setItem(`earnify_coins_${userId}`, userCoins);
        if (showMsg) showToast(`🎉 Balance updated! ${userCoins.toFixed(2)} coins`);
    }

    function loadUserData() {
        const cachedCoins = localStorage.getItem(`earnify_coins_${userId}`);
        if (cachedCoins !== null && !coinsLoaded) {
            userCoins = parseFloat(cachedCoins);
            document.getElementById("totalCoinsDisplay").innerText = userCoins.toFixed(2);
        }
        db.ref(`users/${userId}/coins`).once('value').then(snap => {
            let firebaseCoins = snap.val();
            if (firebaseCoins !== null && firebaseCoins !== undefined) {
                userCoins = firebaseCoins;
                localStorage.setItem(`earnify_coins_${userId}`, userCoins);
            } else {
                db.ref(`users/${userId}`).set({ coins: userCoins, history: [], createdAt: Date.now() });
            }
            document.getElementById("totalCoinsDisplay").innerText = userCoins.toFixed(2);
            coinsLoaded = true;
        }).catch(err => console.error("Firebase error:", err));
    }

    function addHistory(type, amount, status = "completed", details = "") {
        const entry = { type, amount, timestamp: Date.now(), status, details };
        db.ref(`users/${userId}/history`).once('value', snap => {
            let arr = snap.val() || [];
            arr.unshift(entry);
            if (arr.length > 50) arr.pop();
            db.ref(`users/${userId}/history`).set(arr);
        });
    }
    
    function showConfetti() {
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '0px';
            confetti.style.width = Math.random() * 8 + 4 + 'px';
            confetti.style.height = confetti.style.width;
            confetti.style.background = ['#FFD700', '#FFA500', '#FF6347', '#FFD966'][Math.floor(Math.random() * 4)];
            confetti.style.animationDuration = Math.random() * 2 + 1 + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 2000);
        }
    }

    let activeModal = null;
    function closeModal() { if (activeModal) activeModal.classList.remove('active'); activeModal = null; }
    
    function openModal(contentHTML, onClose = null) {
        if (activeModal) closeModal();
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay active';
        const container = document.createElement('div');
        container.className = 'modal-container';
        container.innerHTML = `<span class="close-modal">&times;</span>${contentHTML}`;
        overlay.appendChild(container);
        document.body.appendChild(overlay);
        activeModal = overlay;
        const closeBtn = container.querySelector('.close-modal');
        closeBtn.onclick = () => { closeModal(); if (onClose) onClose(); };
        overlay.onclick = (e) => { if (e.target === overlay) { closeModal(); if (onClose) onClose(); } };
        return container;
    }

    // ========== SPIN WHEEL ==========
    function showSpinGame() {
        let spinResultValue = 0;
        const wheelSegments = [0.1, 0.5, 1, 2, 3, 5, 8, 10];
        const canvas = document.createElement('canvas');
        canvas.width = 300;
        canvas.height = 300;
        canvas.style.width = "240px";
        canvas.style.height = "240px";
        const ctx = canvas.getContext('2d');
        let spinning = false;
        let currentAngle = 0;

        function drawWheel() {
            const segAng = (Math.PI * 2) / wheelSegments.length;
            for (let i = 0; i < wheelSegments.length; i++) {
                const start = currentAngle + i * segAng;
                const end = start + segAng;
                ctx.beginPath();
                ctx.fillStyle = `hsl(${i * 45}, 70%, 55%)`;
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, start, end);
                ctx.fill();
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(start + segAng / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Poppins";
                ctx.fillText(wheelSegments[i].toFixed(1), 70, 10);
                ctx.restore();
            }
            ctx.beginPath();
            ctx.arc(150, 150, 25, 0, 2 * Math.PI);
            ctx.fillStyle = "#FFD966";
            ctx.fill();
            ctx.stroke();
        }
        drawWheel();

        function spinWheel() {
            if (spinning) return;
            spinning = true;
            const spinDuration = 1500;
            const spinDegrees = 360 * 8 + Math.random() * 360;
            let startTime = performance.now();
            let startAngle = currentAngle;
            function animateSpin(now) {
                let elapsed = now - startTime;
                let t = Math.min(1, elapsed / spinDuration);
                let eased = 1 - Math.pow(1 - t, 3);
                let currentDeg = spinDegrees * eased;
                currentAngle = startAngle + (currentDeg * Math.PI / 180);
                ctx.clearRect(0, 0, 300, 300);
                drawWheel();
                if (t < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    let finalAngle = currentAngle % (2 * Math.PI);
                    let segAngle = (2 * Math.PI) / wheelSegments.length;
                    let idx = Math.floor(((2 * Math.PI - finalAngle) % (2 * Math.PI)) / segAngle);
                    if (idx >= wheelSegments.length) idx = 0;
                    spinResultValue = wheelSegments[idx];
                    spinning = false;
                    closeModal();
                    showWatchAdToClaim(spinResultValue, "spin");
                }
            }
            requestAnimationFrame(animateSpin);
        }

        const modalHTML = `<h3>🎡 SPIN WHEEL</h3><div class="wheel-container"></div><button class="spin-btn" id="spinActionBtn">SPIN NOW</button>`;
        const container = openModal(modalHTML);
        container.querySelector('.wheel-container').appendChild(canvas);
        container.querySelector('#spinActionBtn').onclick = () => spinWheel();
    }

    // ========== PREMIUM SCRATCH CARD ==========
    function showScratchGame() {
        let scratchWinAmount = Math.floor(Math.random() * (45 - 15 + 1) + 15);
        let isRevealed = false;
        let scratchPercent = 0;
        
        const modalHTML = `
            <h3 style="margin-bottom:5px;">🎫 SCRATCH CARD</h3>
            <p style="font-size:13px; opacity:0.8; margin-bottom:10px;">Scratch the card to reveal your prize!</p>
            <div class="scratch-card-wrapper">
                <div class="premium-scratch-card" id="scratchCard">
                    <div class="scratch-reveal-layer" id="scratchReveal">
                        <div class="big-coin"></div>
                        <div class="win-amount">${scratchWinAmount}</div>
                        <div class="win-label">COINS</div>
                    </div>
                    <canvas class="scratch-canvas-layer" id="scratchCanvas"></canvas>
                </div>
            </div>
            <div class="scratch-instruction" id="scratchProgress">
                <span>👉 Use your finger to scratch 👈</span>
            </div>
            <div id="claimButtonContainer" style="min-height: 70px;"></div>
        `;
        
        const container = openModal(modalHTML);
        const canvas = container.querySelector('#scratchCanvas');
        const revealDiv = container.querySelector('#scratchReveal');
        const progressDiv = container.querySelector('#scratchProgress');
        const claimContainer = container.querySelector('#claimButtonContainer');
        
        canvas.width = 320;
        canvas.height = 220;
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        
        const ctx = canvas.getContext('2d');
        
        function drawPremiumScratchSurface() {
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#B8B8B8');
            grad.addColorStop(0.3, '#D4D4D4');
            grad.addColorStop(0.6, '#A8A8A8');
            grad.addColorStop(1, '#888888');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#999';
            for (let i = 0; i < 300; i++) {
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 2, 2);
            }
            
            ctx.shadowBlur = 0;
            ctx.font = 'bold 28px "Poppins", "Segoe UI"';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#555';
            ctx.fillText('SCRATCH', canvas.width/2 + 2, canvas.height/2 + 12);
            ctx.fillStyle = '#FFD700';
            ctx.fillText('SCRATCH', canvas.width/2, canvas.height/2 + 10);
            
            ctx.font = '14px "Poppins"';
            ctx.fillStyle = '#666';
            ctx.fillText('↓ scratch here ↓', canvas.width/2, canvas.height/2 + 50);
            
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4;
            ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);
            
            ctx.strokeStyle = 'rgba(255,215,0,0.5)';
            ctx.lineWidth = 1;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
        }
        
        drawPremiumScratchSurface();
        
        let drawing = false;
        let lastX = 0, lastY = 0;
        
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            return { x: Math.max(0, Math.min(canvas.width, x)), y: Math.max(0, Math.min(canvas.height, y)) };
        }
        
        function scratch(e) {
            if (isRevealed) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            
            ctx.globalCompositeOperation = "destination-out";
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, Math.PI * 2);
            ctx.fill();
            
            if (lastX !== 0 && lastY !== 0) {
                const dist = Math.hypot(x - lastX, y - lastY);
                if (dist < 35) {
                    ctx.beginPath();
                    ctx.lineWidth = 36;
                    ctx.lineCap = 'round';
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                }
            }
            lastX = x;
            lastY = y;
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let erasedPixels = 0;
            for (let i = 3; i < imgData.data.length; i += 4) {
                if (imgData.data[i] < 50) erasedPixels++;
            }
            scratchPercent = (erasedPixels / (canvas.width * canvas.height)) * 100;
            
            if (scratchPercent >= 28 && !isRevealed) {
                isRevealed = true;
                revealDiv.style.opacity = "1";
                progressDiv.innerHTML = '<span>🎉 CONGRATULATIONS! 🎉</span>';
                showConfetti();
                
                claimContainer.innerHTML = `
                    <div class="claim-btn-wrapper">
                        <button id="claimRewardBtn" class="ad-button" style="width:100%; padding:14px; font-size:18px;">
                            🎁 CLAIM ${scratchWinAmount} COINS 🎁
                        </button>
                        <p style="font-size:11px; margin-top:8px; opacity:0.6;">Watch a short ad to claim your prize</p>
                    </div>
                `;
                const claimBtn = claimContainer.querySelector('#claimRewardBtn');
                claimBtn.onclick = () => {
                    closeModal();
                    showWatchAdToClaim(scratchWinAmount, "scratch");
                };
            }
        }
        
        function startScratch(e) {
            drawing = true;
            lastX = 0;
            lastY = 0;
            scratch(e);
        }
        
        function endScratch() {
            drawing = false;
            lastX = 0;
            lastY = 0;
        }
        
        canvas.addEventListener('mousemove', (e) => { if (drawing) scratch(e); });
        canvas.addEventListener('mousedown', startScratch);
        canvas.addEventListener('mouseup', endScratch);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (drawing) scratch(e); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startScratch(e); });
        canvas.addEventListener('touchend', endScratch);
    }

    // ========== WATCH AD & CLAIM ==========
    function showWatchAdToClaim(amount, source) {
        const modalHTML = `
            <h3>🎉 You Won ${amount.toFixed(2)} Coins!</h3>
            <div style="font-size:48px; margin:15px 0;">💰</div>
            <p style="margin: 10px 0;">Watch an ad to claim your reward</p>
            <button id="watchAdClaimBtn" class="ad-button" style="min-width: 200px;">📺 Watch Ad & Claim</button>
        `;
        const container = openModal(modalHTML);
        const watchBtn = container.querySelector('#watchAdClaimBtn');
        
        watchBtn.onclick = () => {
            const originalText = watchBtn.innerHTML;
            watchBtn.innerHTML = '<span class="ad-loading"></span> Loading Ad...';
            watchBtn.disabled = true;
            
            showRewardedAd(
                () => {
                    let newBal = userCoins + amount;
                    updateCoins(newBal, true);
                    addHistory("earn", amount, "completed", `${source === "spin" ? "Spin wheel" : "Scratch card"} win`);
                    closeModal();
                    showToast(`✨ You earned ${amount.toFixed(2)} coins!`);
                },
                (err) => {
                    watchBtn.innerHTML = originalText;
                    watchBtn.disabled = false;
                    showToast("⚠️ Ad failed to load. Please try again.");
                }
            );
        };
    }

    // ========== REDEEM ==========
    function showRedeem() {
        const modalHTML = `
            <h3>💸 Redeem Points</h3>
            <p>Current Balance: <strong>${userCoins.toFixed(2)}</strong> Coins</p>
            <div class="redeem-fields">
                <input type="text" id="binaryUID" placeholder="Your Binance UID" />
                <input type="number" id="redeemAmount" placeholder="Amount (Coins)" />
            </div>
            <button id="confirmRedeemBtn" class="btn-primary">Request Withdrawal</button>
        `;
        const container = openModal(modalHTML);
        container.querySelector('#confirmRedeemBtn').onclick = () => {
            const uid = container.querySelector('#binaryUID').value.trim();
            const amount = parseFloat(container.querySelector('#redeemAmount').value);
            if (!uid) { showToast("Enter Binance UID"); return; }
            if (isNaN(amount) || amount <= 0) { showToast("Enter valid amount"); return; }
            if (amount > userCoins) { showToast("Insufficient balance"); return; }
            
            const request = {
                userId: userId,
                uid: uid,
                points: amount,
                timestamp: Date.now(),
                status: "pending",
                username: tgUser.username
            };
            db.ref(`admin/requests`).push(request).then(() => {
                addHistory("withdraw_request", amount, "pending", `Binance UID: ${uid}`);
                showToast("✅ Withdrawal request sent!");
                closeModal();
            }).catch(() => showToast("Error sending request"));
        };
    }

    // ========== HISTORY & REFERRAL (FIXED - Direct App Link) ==========
    function showHistoryAndRefer() {
        const shareText = `🎁 JOIN EARNIFY & GET 150 BONUS COINS! 🎁\n\n💰 Earn coins by spinning wheel & scratching cards!\n💸 Withdraw to Binance!\n\n👉 Click here to join: ${REFERRAL_LINK}`;
        
        const modalHTML = `
            <h3>📜 History & Referrals</h3>
            <div class="refer-box">
                🤝 <strong>REFER & EARN 150 COINS</strong><br/>
                <p style="font-size:12px; margin:8px 0;">Share this link with friends. When they join, you get 150 coins!</p>
                <div class="share-buttons">
                    <button id="copyLinkBtn" class="share-btn share-copy">📋 Copy Link</button>
                    <button id="shareTelegramBtn" class="share-btn share-telegram">📲 Telegram</button>
                    <button id="shareWhatsAppBtn" class="share-btn share-whatsapp">💬 WhatsApp</button>
                </div>
                <div class="refer-link-box" id="referLinkDisplay">
                    ${REFERRAL_LINK}
                </div>
                <p style="font-size:10px; margin-top:10px; opacity:0.7;">⭐ When friends join via this link, you both get 150 coins bonus!</p>
            </div>
            <div id="historyContainer" class="history-list">Loading...</div>
        `;
        
        const container = openModal(modalHTML);
        
        db.ref(`users/${userId}/history`).once('value', snap => {
            let list = snap.val() || [];
            if (list.length === 0) {
                container.querySelector('#historyContainer').innerHTML = "<div class='history-item'>No transactions yet</div>";
            } else {
                container.querySelector('#historyContainer').innerHTML = list.slice(0, 20).map(h => 
                    `<div class='history-item'>${new Date(h.timestamp).toLocaleString()} | ${h.type === "earn" ? "➕ Earned" : "➖ Withdraw"} ${h.amount} | ${h.status}</div>`
                ).join('');
            }
        });
        
        container.querySelector('#copyLinkBtn').onclick = () => {
            navigator.clipboard.writeText(REFERRAL_LINK).then(() => {
                showToast("✅ Referral link copied!");
            }).catch(() => {
                prompt("Copy this link:", REFERRAL_LINK);
            });
        };
        
        container.querySelector('#shareTelegramBtn').onclick = () => {
            const tgUrl = `https://t.me/share/url?url=${encodeURIComponent(REFERRAL_LINK)}&text=${encodeURIComponent(shareText)}`;
            window.open(tgUrl, '_blank');
        };
        
        container.querySelector('#shareWhatsAppBtn').onclick = () => {
            const waUrl = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
            window.open(waUrl, '_blank');
        };
    }

    // Check for referral bonus when user joins via link
    function checkReferralBonus() {
        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('ref');
        
        if (referrerId && referrerId !== userId && referrerId.length > 5) {
            db.ref(`users/${userId}/referralBonusClaimed`).once('value', snap => {
                if (!snap.val()) {
                    // Give bonus to new user
                    updateCoins(userCoins + 150, true);
                    addHistory("earn", 150, "completed", "Signup referral bonus");
                    db.ref(`users/${userId}/referralBonusClaimed`).set(true);
                    showToast("🎉 150 BONUS COINS ADDED for joining via referral!");
                    
                    // Give bonus to referrer
                    db.ref(`users/${referrerId}/coins`).once('value', snap => {
                        let referrerCoins = snap.val() || 0;
                        db.ref(`users/${referrerId}/coins`).set(referrerCoins + 150);
                        db.ref(`users/${referrerId}/history`).once('value', hSnap => {
                            let hist = hSnap.val() || [];
                            hist.unshift({ type: "earn", amount: 150, timestamp: Date.now(), status: "completed", details: "Referral bonus from new user" });
                            if (hist.length > 50) hist.pop();
                            db.ref(`users/${referrerId}/history`).set(hist);
                        });
                    });
                }
            });
        }
    }

    function goToHelp() { 
        window.open("https://t.me/vuy903", "_blank");
    }

    // Event Listeners
    document.querySelectorAll('.option-card').forEach(card => {
        card.addEventListener('click', () => {
            const opt = card.dataset.option;
            if (opt === 'spin') showSpinGame();
            else if (opt === 'scratch') showScratchGame();
            else if (opt === 'redeem') showRedeem();
            else if (opt === 'history') showHistoryAndRefer();
        });
    });
    document.getElementById('helpCentreBtn').onclick = goToHelp;

    loadUserData();
    checkReferralBonus();
    
    // Show hosting warning if needed
    if (window.location.protocol === 'file:') {
        setTimeout(() => {
            showToast("⚠️ For referral links to work, host this app on a server");
        }, 2000);
    }
</script>
